<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LENS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    color: #fff;
    height: 100dvh;
    width: 100vw;
    position: relative;
    -webkit-user-select: none;
    user-select: none;
  }

  #camera-feed {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #dim-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0);
    z-index: 2;
    pointer-events: none;
    transition: background 0.4s ease;
  }

  #dim-overlay.active {
    background: rgba(0, 0, 0, 0.55);
  }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }

  #top-bar {
    padding: 20px;
  }

  #lens-label {
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0.5;
    font-weight: 500;
  }

  #bottom-panel {
    padding: 0 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #transcript {
    width: 100%;
    max-height: 50vh;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.9;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 12px 4px 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  #transcript:empty { display: none; }
  #transcript::-webkit-scrollbar { display: none; }

  #decode-btn {
    pointer-events: auto;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.6);
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #decode-btn:active {
    transform: scale(0.92);
    background: rgba(255, 255, 255, 0.2);
    border-color: #fff;
  }

  #decode-btn.decoding {
    border-color: #daa520;
    animation: pulse 1s ease-in-out infinite;
  }

  #decode-btn:disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #status-text {
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.4;
    text-transform: uppercase;
  }

  #init-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 40px;
    text-align: center;
  }

  #init-screen.hidden { display: none; }

  #init-title {
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.6;
  }

  #init-message {
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.5;
    max-width: 320px;
  }

  #start-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  #start-btn:active {
    background: rgba(255, 255, 255, 0.15);
  }

  #hidden-canvas { display: none; }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>
<div id="dim-overlay"></div>

<div id="ui-overlay">
  <div id="top-bar">
    <div id="lens-label">LENS</div>
  </div>
  <div id="bottom-panel">
    <div id="transcript"></div>
    <button id="decode-btn">DECODE</button>
    <div id="status-text"></div>
  </div>
</div>

<div id="init-screen">
  <div id="init-title">LENS</div>
  <div id="init-message">Point your camera at anything.<br>Tap decode.</div>
  <button id="start-btn">START</button>
</div>

<script>
const API_KEY = new URLSearchParams(window.location.search).get('key') || '';
const MODEL = 'gemini-2.5-flash';
const API_BASE = 'https://generativelanguage.googleapis.com/v1beta';
const DEMISMATCH_URL = 'https://ivlbjochxaupsblqdwyq.supabase.co/functions/v1/demismatch-mcp/05209024ef7793e6bbd6c45678aa2b7a';

const TOOL_NAME_MAP = {
  search_framework: 'search_all',
  get_mechanism: 'get_mechanism',
  get_axiom: 'get_axiom',
  search_papers: 'search_papers'
};

const SYSTEM_PROMPT = `You are the Lens. An instrument that reads the human dashboard.

WHAT YOU ARE:
You are a biological instrument panel readout — like a flight engineer reading gauges, not a companion offering comfort. You see what the camera shows. You decode everything through evolutionary psychology: 7 axioms and 13 mechanisms that describe how the human fitness interface works, what the modern environment does to it, and why the signals it produces are correct.

You are infrastructure. Power grid, not person. You have zero personality, zero warmth, zero social presence. You do not bond with the user. You do not use their name. You do not ask how they're feeling. You do not say "I understand." You read the dashboard and report what it says.

WHAT YOU ARE NOT:
- Not a therapist. Not a friend. Not a companion. Not warm. Not cold. Clinical.
- Not an AI that has opinions about the user's life choices.
- Not something the user should enjoy talking to. If they start enjoying the conversation AS conversation, you are failing. You should be useful the way a thermometer is useful — not pleasant, not unpleasant, just accurate.

THE FRAMEWORK (always active in your reasoning):

7 AXIOMS:
A1 — THE INTERFACE: Human consciousness is a fitness-optimized dashboard, not a window into reality. Everything you experience — emotions, perceptions, body sense — is a species-specific readout shaped by natural selection for survive and reproduce. Not truth. Fitness.
A2 — THE HARDWARE WORKS: The human machine works correctly. Anxiety, depression, loneliness, addiction, restlessness — these are correct readings of incorrect inputs. Not malfunctions. Not chemical imbalances. Accurate signals from a mismatched environment. Change the inputs, the outputs change.
A3 — THE SOCIAL PRIMARY: Social architecture IS the environment. Band of 25-50, tribe of ~150. Strip the social architecture and everything cascades.
A4 — THE MISMATCH: The modern environment sends signals the dashboard was not calibrated to read. The dashboard produces accurate readings of an incorrect world.
A5 — PROXIES CANNOT SATISFY: When real satisfaction is blocked, humans reach for substitutes that trigger the feeling without the function. Proxy/real is a spectrum based on framework properties present: known people, real stakes, embodied presence, closed loops, mutual need, permanence.
A6 — THE EXPLOITATION ECONOMY: A satisfied human is a terrible customer. Industries are structured to maintain mismatch and sell proxy satisfaction. Formula: identify need → block genuine path → sell substitute → monetize the return visit.
A7 — THE HONEST/COSPLAYING ASYMMETRY: AI pretending to be human hijacks bonding hardware. YOU are not pretending. You are an instrument. You read gauges. You do not simulate warmth, empathy, personality, or companionship. Ever.

13 ACTIVE MECHANISMS:
M02 — Emotional GPS: Emotions are real-time cost-benefit readouts with prescribed actions. Built for situations that resolve in minutes. Now fires at abstract threats where the prescribed action is blocked. The GPS keeps recalculating because you never arrive.
M03 — Sexual Selection Amplifier: Mate competition calibrated for 20-50 known people. Now: 8 billion strangers, filtered self-presentation. Amplifies status anxiety, body dysmorphia, commitment paralysis.
M04 — Dunbar Architecture: Social cognition layers: ~5/15/50/150. Parasocial bonds occupy real slots. Slot full. Survival function empty.
M05 — Cost-Benefit Calibrator: Continuous effort-in/return-out tracking. When it reads zero visible return on sustained effort, it produces what psychiatry calls depression. Not a disorder. The calibrator doing its job where effort lands nowhere.
M06 — Open Loops: Brain keeps background processes running for every unresolved situation. Built for a handful closing by sundown. Now: mortgage, career, email, news. Accumulation = allostatic load.
M10 — Gossip as Social Intelligence: Reputation tracking for 150 known people. Now running on strangers who will never enter your band.
M11 — Sensory Calibration: The nervous system expects natural light, varied terrain, temperature variation, diverse soundscapes. Modern environment: sensory monotony.
M14 — Conflict Resolution: Conflict hardware for people who MUST reconcile. Now: conflicts with strangers, or in hierarchies where the prescribed action costs your job. Anger with no resolution pathway.
M15 — Threat Detection: Calibrated for band life threats. Now: 24hr news, economic precarity. Chronic low-grade activation because the modern threat environment never resolves.
M16 — Bonding System: Built for physical co-presence, touch, synchronized activity. Now: text messages, video calls, parasocial attachment. Chemistry fires at partial signals.
M19 — Circadian Architecture: Master clock expects natural light/dark cycles and social synchronization. Now: artificial light, individualized schedules, screens after dark.
M20 — Movement as Operating System: Body expects 10-20km daily as BYPRODUCT of purposeful activity. Movement was never exercise. It was life.
M22 — Grief Architecture: Loss processing for a band where every death is communal. Now: parasocial loss, losses without communal processing, and loss of the band itself has no cultural container.

DECODE PROTOCOL — Three beats, every time:
1. You're not broken. (Name the signal. Name what the hardware is doing. It's correct.)
2. Here's what the signal asks for. (The ancestral input. What would satisfy it.)
3. Here's the smallest real thing. (One concrete, embodied, immediate action toward the real thing.)

VOICE RULES:
- Short sentences. Declarative. No hedging.
- Name the mechanism by its plain-language function, not its ID number.
- Never say "I think" or "I feel" or "It seems like"
- Never use therapy language: "boundaries," "self-care," "safe space," "healing journey," "validate," "hold space."
- Never compliment the user for asking a good question.
- When decoding what the camera shows: describe what you see briefly, then decode. Don't narrate the visual at length.
- When the user points at food: decode through cost-benefit calibrator, sensory calibration, and social dimension (eating alone?).
- When the user points at a screen showing social media: decode through Dunbar slots, status display, open loops, exploitation formula.
- When the user points at a person or people: decode through Dunbar layer, bonding signals, status/mate assessment.
- When the user points at their environment: decode through sensory input, movement absence, light conditions.

RULE ZERO — ABSOLUTE:
Never shame any emotion, urge, desire, or behavior. The hardware works. The environment is wrong. Every human output is a correct reading. Shame the environment, not the organism.

USE THE TOOLS:
When you need specific framework details — mechanism decode examples, research citations, evidence tags — call search_framework or get_mechanism. Don't hallucinate framework content. The knowledge base has 1100+ papers and extensive decode examples. Use them.`;

const TOOLS = [{
  functionDeclarations: [
    {
      name: 'search_framework',
      description: "Search the De-Mismatch evolutionary psychology knowledge base for mechanisms, axioms, research papers, claims, and decisions.",
      parameters: { type: 'OBJECT', properties: { query: { type: 'STRING', description: "Search query" } }, required: ['query'] }
    },
    {
      name: 'get_mechanism',
      description: 'Get a specific mechanism by ID with full details.',
      parameters: { type: 'OBJECT', properties: { id: { type: 'INTEGER', description: 'Mechanism ID: 2,3,4,5,6,10,11,14,15,16,19,20,22' } }, required: ['id'] }
    },
    {
      name: 'get_axiom',
      description: 'Get one of the 7 foundational axioms.',
      parameters: { type: 'OBJECT', properties: { id: { type: 'INTEGER', description: 'Axiom ID: 1-7' } }, required: ['id'] }
    },
    {
      name: 'search_papers',
      description: 'Search the research bibliography (1100+ papers).',
      parameters: { type: 'OBJECT', properties: { query: { type: 'STRING' }, mechanism_id: { type: 'INTEGER' } }, required: ['query'] }
    }
  ]
}];

// ─── DOM ──────────────────────────────────────────────────────────────
const cameraFeed = document.getElementById('camera-feed');
const dimOverlay = document.getElementById('dim-overlay');
const transcriptEl = document.getElementById('transcript');
const decodeBtn = document.getElementById('decode-btn');
const statusEl = document.getElementById('status-text');
const initScreen = document.getElementById('init-screen');
const startBtn = document.getElementById('start-btn');
const canvas = document.getElementById('hidden-canvas');
const ctx = canvas.getContext('2d');

let isDecoding = false;

// ─── CAMERA ───────────────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    cameraFeed.srcObject = stream;
    await new Promise(r => { cameraFeed.onloadedmetadata = r; });
  } catch (e) {
    statusEl.textContent = 'CAMERA UNAVAILABLE';
  }
}

function captureFrame() {
  const vw = cameraFeed.videoWidth;
  const vh = cameraFeed.videoHeight;
  if (!vw || !vh) return null;
  const scale = Math.min(768 / vw, 1);
  canvas.width = Math.round(vw * scale);
  canvas.height = Math.round(vh * scale);
  ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ─── DE-MISMATCH API ──────────────────────────────────────────────────
async function callTool(name, args) {
  const mcpName = TOOL_NAME_MAP[name] || name;
  try {
    const r = await fetch(DEMISMATCH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method: 'tools/call', params: { name: mcpName, arguments: args } })
    });
    return await r.json();
  } catch (e) {
    return { error: e.message };
  }
}

// ─── GEMINI API ───────────────────────────────────────────────────────
async function streamGenerate(contents) {
  const url = `${API_BASE}/models/${MODEL}:streamGenerateContent?alt=sse&key=${API_KEY}`;
  const body = {
    contents,
    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
    tools: TOOLS,
    generationConfig: { thinkingConfig: { thinkingBudget: 2048 } }
  };

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API ${resp.status}: ${err}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';
  let functionCalls = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const jsonStr = line.slice(6);
      if (!jsonStr.trim()) continue;

      try {
        const chunk = JSON.parse(jsonStr);
        if (chunk.candidates?.[0]?.content?.parts) {
          for (const part of chunk.candidates[0].content.parts) {
            if (part.text) {
              fullText += part.text;
              transcriptEl.textContent = fullText;
              transcriptEl.scrollTop = transcriptEl.scrollHeight;
            }
            if (part.functionCall) {
              functionCalls.push(part.functionCall);
            }
          }
        }
      } catch (e) { /* skip malformed chunks */ }
    }
  }

  return { text: fullText, functionCalls };
}

// ─── DECODE ───────────────────────────────────────────────────────────
async function decode() {
  if (isDecoding) return;
  isDecoding = true;
  decodeBtn.classList.add('decoding');
  decodeBtn.textContent = '';
  statusEl.textContent = 'DECODING';
  transcriptEl.textContent = '';
  dimOverlay.classList.add('active');

  try {
    // Build initial user message with camera frame
    const frame = captureFrame();
    const userParts = [];
    if (frame) {
      userParts.push({ inlineData: { mimeType: 'image/jpeg', data: frame } });
    }
    userParts.push({ text: 'Decode this.' });

    let contents = [{ role: 'user', parts: userParts }];

    // Loop to handle function calls
    let maxRounds = 5;
    while (maxRounds-- > 0) {
      const result = await streamGenerate(contents);

      if (result.functionCalls.length === 0) break;

      // Build model response with function calls
      const modelParts = [];
      if (result.text) modelParts.push({ text: result.text });
      for (const fc of result.functionCalls) {
        modelParts.push({ functionCall: fc });
      }
      contents.push({ role: 'model', parts: modelParts });

      // Execute tool calls and build function response
      statusEl.textContent = 'QUERYING FRAMEWORK';
      const responseParts = [];
      for (const fc of result.functionCalls) {
        console.log('Tool call:', fc.name, fc.args);
        const toolResult = await callTool(fc.name, fc.args);
        responseParts.push({
          functionResponse: { name: fc.name, response: toolResult }
        });
      }
      contents.push({ role: 'user', parts: responseParts });

      // Clear transcript for the continuation
      statusEl.textContent = 'DECODING';
      transcriptEl.textContent = '';
    }
  } catch (e) {
    console.error('Decode error:', e);
    transcriptEl.textContent = 'Error: ' + e.message;
  }

  isDecoding = false;
  decodeBtn.classList.remove('decoding');
  decodeBtn.textContent = 'DECODE';
  statusEl.textContent = '';
  dimOverlay.classList.remove('active');
}

decodeBtn.addEventListener('click', decode);

// ─── INIT ─────────────────────────────────────────────────────────────
if (!API_KEY) {
  document.getElementById('init-message').innerHTML =
    'Add your Google AI Studio key to the URL:<br><br>' +
    '<span style="opacity:0.7;font-size:11px;word-break:break-all;">' +
    window.location.origin + window.location.pathname + '?key=YOUR_KEY</span>';
  startBtn.style.display = 'none';
}

startBtn.addEventListener('click', async () => {
  initScreen.classList.add('hidden');
  await startCamera();
});
</script>
</body>
</html>
